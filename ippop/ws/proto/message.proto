syntax = "proto3";

package pb;

option go_package = "../pb";

service  message{
}

// 定义消息类型枚举
enum MessageType {
    UNKNOWN = 0;
    COMMAND = 1;
    PROXY_SESSION_CREATE = 2;
    PROXY_SESSION_DATA = 3;
    PROXY_SESSION_CLOSE = 4;
    PROXY_UDP_DATA = 5;
    PROXY_SESSION_HALF_CLOSE = 6;
    UPLOAD_TEST_REQ = 10;
    UPLOAD_TEST_DATA = 11;
}



// 目标地址
message DestAddr {
    string addr = 2;
}

message UDPData {
    string addr = 1;
    bytes data = 2;
}


// 定义通用消息体
message Message {
    MessageType type = 1;
    string session_id = 2;
    bytes payload = 3;
}

message CreateSessionReply {
    bool success = 1;
    string err_msg = 2;
}

message UploadTestRequest {
    enum Action {
        START = 0;
        STOP = 1;
    }
    Action action = 1;
    int32 duration = 2;    // 预期测试时长 (秒)
    string session_id = 3; // 会话唯一 ID
}

message UploadTestResult {
    string session_id = 1;
    string node_id = 2;
    uint64 total_bytes = 3;
    int32 duration_ms = 4;
    double mbps = 5;
    bool success = 6;
    string error_msg = 7;
}